      ### C5. 创建配置读取工具
      创建 `/Users/tianjangwang/Documents/历史事件预测建模/utils/config_loader.py`：
      ```python
      import yaml

      def load_config(path='config/pipeline_config.yaml'):
          with open(path) as f:
              return yaml.safe_load(f)
      
      def get(key, default=None, config=None):
          """获取配置值：支持点号路径，如 'psi.weights.sfd'"""
          if config is None:
              config = load_config()
          keys = key.split('.')
          value = config
          for k in keys:
              value = value.get(k, default)
          return value
      ```

