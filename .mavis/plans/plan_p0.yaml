  - id: stat-repair
    title: '统计规范修复（Adjusted R² + 效应量 + Holm校正）'
    prompt: |
      ## 任务说明
      基于 Track 1 研究成果，在项目代码中实现统计规范修复。

      ## 具体任务
      创建或编辑文件：`/Users/tianjangwang/Documents/历史事件预测建模/utils/stats_repair.py`
      
      实现以下函数（可直接复制 Track 1 报告中的代码）：

      ```python
      def adjusted_r2(r2, n, k):
          """自由度校正 R²"""
          return 1 - (1 - r2) * (n - 1) / (n - k - 1)

      def cohens_d(group1, group2):
          """Cohen's d 效应量"""
          import numpy as np
          n1, n2 = len(group1), len(group2)
          pooled_std = np.sqrt(((n1-1)*np.std(group1, ddof=1)**2 + 
                                (n2-1)*np.std(group2, ddof=1)**2) / (n1+n2-2))
          return (np.mean(group1) - np.mean(group2)) / pooled_std

      def hedges_g(cohens_d_val, n1, n2):
          """小样本修正版 Hedges' g"""
          df = n1 + n2 - 2
          correction = 1 - 3 / (4*df - 1)
          return cohens_d_val * correction

      def holm_correction(p_values, alpha=0.05):
          """Holm-Bonferroni 逐步校正"""
          import numpy as np
          k = len(p_values)
          sorted_idx = np.argsort(p_values)
          sorted_p = p_values[sorted_idx]
          adjusted = np.zeros(k)
          for i in range(k):
              threshold = alpha / (k - i)
              if sorted_p[i] <= threshold:
                  for j in range(i, k):
                      adjusted[sorted_idx[j]] = min(sorted_p[j] * (k - j), 1.0)
                  break
              else:
                  adjusted[sorted_idx[i]] = sorted_p[i]
          return adjusted

      def wfa_evaluate(train_data, test_data, psi_func):
          """Walk-Forward 评估"""
          import numpy as np
          predictions = []
          actuals = []
          for train, test in zip(train_data, test_data):
              model = psi_func(train)
              pred = model.predict(test)
              predictions.extend(pred)
              actuals.extend([t['psi'] for t in test])
          mae = np.mean(np.abs(np.array(predictions) - np.array(actuals)))
          rmse = np.sqrt(np.mean((np.array(predictions) - np.array(actuals))**2))
          return {'MAE': mae, 'RMSE': rmse}
      ```

      然后用北宋数据验证：
      - 北宋原始回归 R²=0.68, n=7, k=3 → 计算 Adjusted R²，验证是否为 0.36
      - 如果有北宋末期/初期的 PSI 列表，计算 Cohen's d
      - 假设进行了 10 次检验，输出 Holm 校正后的结果

      ## 输出
