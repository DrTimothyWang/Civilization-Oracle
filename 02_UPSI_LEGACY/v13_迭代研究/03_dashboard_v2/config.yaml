# UPSI Dashboard v13c — 示例配置文件
# 复制为 config.yaml 并修改以自定义行为

# 资产列表: 内部名称 -> yfinance ticker
assets:
  US.SP500: "^GSPC"
  JP.N225: "^N225"
  CA.TSX: "^GSPTSE"
  UK.FTSE: "^FTSE"
  DE.DAX: "^GDAXI"
  HK.HSI: "^HSI"
  BR.BVSP: "^BVSP"
  AR.MERVAL: "^MERV"
  TR.XU100: "XU100.IS"
  AU.ASX: "^AXJO"
  FR.CAC: "^FCHI"
  IN.NIFTY: "^NSEI"
  RU.IMOEX: "IMOEX.ME"
  USDJPY: "JPY=X"
  EURUSD: "EURUSD=X"
  GBPUSD: "GBPUSD=X"
  US.10Y: "^TNX"
  GOLD: "GC=F"
  OIL.WTI: "CL=F"
  VIX: "^VIX"

# 历史数据天数 (默认 252 ≈ 1年交易日)
history_days: 252

# UPSI 告警阈值
alert_threshold_upsi: -0.5

# 单资产 PSI 告警阈值
alert_threshold_asset: -0.5

# 触发 CRITICAL 级别的最小警报资产数
alert_assets_count_critical: 5

# 输出目录
output_dir: "."

# 输出文件名
output_html: "dashboard_latest.html"
output_json: "dashboard_data_v2.json"

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# 守护模式间隔 (小时)
daemon_interval_hours: 4.0

# yfinance 重试次数
max_retries_yf: 3

# 重试间隔 (秒)
retry_delay_seconds: 2.0

# Webhook 告警 URL (可选，留空则禁用)
# 支持 Slack, 钉钉, 企业微信等任何接受 POST JSON 的端点
webhook_url: null

# 邮件收件人 (可选，当前版本通过 GitHub Actions 原生通知)
email_recipient: null

# 模拟数据参数 (当 yfinance 失败时使用)
simulated_data_bias: -0.0002
simulated_data_volatility: 0.012
